<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文本标签练习</title>
</head>
<body>
    <h2>1. <code>标签：代码展示</code></h2>
    <p>JS代码示例：<code>document.querySelector('.notice').addEventListener('click', function(){...})</code></p>

    <h2>2. <em>标签：语义强调（斜体）</em></h2>
    <p>请<em>务必</em>在3月25日前提交实习申请。</p>

    <h2>3. <s>标签：删除线（标记过时内容）</s></h2>
    <p>实习报名时间：<s>3月10日-3月20日</s> 延长至3月25日</p>

    <h2>4. <strong>标签：重要内容（加粗）</strong></h2>
    <p><strong>重要提醒：</strong>逾期未提交视为自动放弃实习资格。</p>

    <h2>5. <sub>标签：下标</sub></h2>
    <p>水的化学式：H<sub>2</sub>O，硫酸化学式：H<sub>2</sub>SO<sub>4</sub></p>

    <h2>6. <sup>标签：上标</sup></h2>
    <p>勾股定理：a<sup>2</sup> + b<sup>2</sup> = c<sup>2</sup>，注册商标：™<sup>®</sup></p>
</body>
</html>
