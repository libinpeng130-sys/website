<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的家乡</title>
    <style>
        body { font-family: "微软雅黑"; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        h2 { color: #3498db; margin-top: 30px; }
        p { line-height: 1.6; color: #34495e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到我的家乡</h1>

        <h2>🍜 特色美食</h2>
        <p>这里的美食独具风味，例如辣子鸡、酸汤火锅，口感丰富，是当地人的首选，也是外地游客必尝的地道风味。</p >

        <h2>🎁 名优特产</h2>
        <p>本地盛产罗非鱼、乌鱼、等特产，肉质鲜美、品质优良，是馈赠亲友的佳品。</p >

        <h2>🏛️ 名胜古迹</h2>
        <p>拥有黄果树瀑布、北盘江大桥等著名地标，历史底蕴深厚，见证了城市的发展与变迁。</p >
    </div>
</body>
</html>
